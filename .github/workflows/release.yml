name: Create Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  actions: read

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }} (${{ github.event.head_commit.timestamp }})
          body: |
            ## Changes in this Release
            
            Please refer to the commit history for details.
          draft: false
          prerelease: false
