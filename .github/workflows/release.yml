name: Create Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create Release
        run: |
          gh release create "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --title "Release ${{ github.ref_name }}" \
            --notes "Release created on $(date '+%Y-%m-%d %H:%M:%S')"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
